# Railway deployment config for capture-mcp-server.
# Runs the server in HTTP mode (StreamableHTTP transport) on Railway-injected $PORT.
# Auth note: set MCP_REQUIRE_OAUTH=true for remote MCP connector auth.

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
